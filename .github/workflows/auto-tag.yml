name: Auto Tag

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 确定 bump 级别
        id: bump
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"major"'; then
            LEVEL="major"
          elif echo "$LABELS" | grep -q '"minor"'; then
            LEVEL="minor"
          else
            LEVEL="patch"
          fi
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "Bump 级别: $LEVEL"

      - name: 获取当前版本
        id: current
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "当前版本: $VERSION"

      - name: 计算新版本号
        id: next
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          case "${{ steps.bump.outputs.level }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "新版本: v$NEW_VERSION"

      - name: 更新版本号
        run: |
          NEW_VER="${{ steps.next.outputs.version }}"
          for pkg_file in package.json packages/*/package.json; do
            node -e "
              const pkg = require('./${pkg_file}');
              pkg.version = '$NEW_VER';
              require('fs').writeFileSync('./${pkg_file}', JSON.stringify(pkg, null, 2) + '\n');
            "
          done
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/*/package.json
          git commit -m "chore: bump version to v$NEW_VER"

      - name: 打 tag 并推送
        run: |
          TAG="v${{ steps.next.outputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin main --follow-tags
